<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ToolNest – Free Online PDF & Image Tools</title>
  <meta name="description" content="Free online tools: PDF Converter, Background Remover, Image Converter, PDF Compress, PDF Merge & Split."/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
  </head>
<body>

  <script type="module">
    import { handleBgRemove } from './app.js';
    window.handleBgRemove = handleBgRemove;
  </script>

  <script>
    function bgLoad(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById('bgPreview').src = ev.target.result;
        document.getElementById('bgPreview').classList.add('show');
        if(window.handleBgRemove) {
            window.handleBgRemove(file);
        }
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
